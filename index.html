<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SocialBook Advanced</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, Arial;
    background:#f0f2f5;
}

header{
    background:white;
    padding:12px 20px;
    font-size:24px;
    font-weight:bold;
    color:#1877f2;
    position:sticky;
    top:0;
    box-shadow:0 1px 4px rgba(0,0,0,.1);
}

.container{
    max-width:700px;
    margin:auto;
}

.post{
    background:white;
    margin:15px 0;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 1px 3px rgba(0,0,0,.1);
}

.post-header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px;
}

.avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#ccc;
}

.content{
    padding:0 12px 12px;
}

img{
    width:100%;
}

.actions{
    display:flex;
    border-top:1px solid #ddd;
}

.actions button{
    flex:1;
    padding:10px;
    border:none;
    background:white;
    cursor:pointer;
}

.actions button:hover{
    background:#f0f2f5;
}

.comment-box{
    padding:10px;
    border-top:1px solid #eee;
}

.comment{
    background:#f0f2f5;
    padding:6px;
    margin-top:5px;
    border-radius:8px;
}

input{
    width:100%;
    padding:8px;
    border:none;
    margin-top:8px;
    border-radius:8px;
    background:#f0f2f5;
}

.add-post{
    background:white;
    padding:10px;
    border-radius:12px;
    margin-top:15px;
}

textarea{
    width:100%;
    border:none;
    background:#f0f2f5;
    padding:10px;
    border-radius:8px;
    resize:none;
}

.add-post button{
    margin-top:8px;
    width:100%;
    padding:10px;
    border:none;
    background:#1877f2;
    color:white;
    border-radius:8px;
}
</style>
</head>

<body>

<header>SocialBook</header>

<div class="container">

<div class="add-post">
    <textarea id="newPost" placeholder="Exprime-toi..."></textarea>
    <button onclick="addPost()">Publier</button>
</div>

<div id="feed"></div>

</div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")) || [
    {id:1, user:"Alice", text:"Bonjour ☀️", likes:0, comments:[]},
    {id:2, user:"Jean", text:"Je crée mon réseau social 🚀", likes:0, comments:[]}
];

function save(){
    localStorage.setItem("posts", JSON.stringify(posts));
}

function render(){
    let feed = document.getElementById("feed");
    feed.innerHTML = "";

    posts.forEach(p => {

        feed.innerHTML += `
        <div class="post">

            <div class="post-header">
                <div class="avatar"></div>
                <b>${p.user}</b>
            </div>

            <div class="content">${p.text}</div>

            <img src="https://picsum.photos/800/400?random=${p.id}">

            <div class="actions">
                <button onclick="like(${p.id})">👍 Like (${p.likes})</button>
                <button onclick="toggle(${p.id})">💬 Commenter</button>
                <button onclick="share()">↗ Partager</button>
            </div>

            <div class="comment-box" id="c-${p.id}" style="display:none">

                <input placeholder="Écrire..."
                       onkeydown="comment(event,${p.id},this)">

                <div>
                    ${p.comments.map(c => `<div class="comment">${c}</div>`).join("")}
                </div>

            </div>

        </div>`;
    });

    save();
}

function addPost(){
    let text = document.getElementById("newPost").value;
    if(text.trim() === "") return;

    posts.unshift({
        id:Date.now(),
        user:"Vous",
        text:text,
        likes:0,
        comments:[]
    });

    document.getElementById("newPost").value = "";
    render();
}

function like(id){
    let p = posts.find(x => x.id === id);
    p.likes++;
    render();
}

function toggle(id){
    let box = document.getElementById("c-"+id);
    box.style.display = box.style.display === "none" ? "block" : "none";
}

function comment(e,id,input){
    if(e.key === "Enter"){
        let p = posts.find(x => x.id === id);
        p.comments.push(input.value);
        input.value = "";
        render();
    }
}

function share(){
    navigator.share?.({
        title:"SocialBook",
        url:window.location.href
    }) || alert("Lien copié !");
}

render();
</script>

</body>
</html>
