<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SocialBook</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f0f2f5;
}

header{
    background:#1877f2;
    color:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.search{
    width:250px;
    padding:8px 12px;
    border:none;
    border-radius:20px;
}

.container{
    max-width:1200px;
    margin:20px auto;
    display:flex;
    gap:20px;
}

.sidebar{
    width:250px;
}

.sidebar ul{
    list-style:none;
}

.sidebar li{
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
}

.sidebar li:hover{
    background:#e4e6eb;
}

.feed{
    flex:1;
}

.post{
    background:white;
    padding:15px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.post h3{
    margin-bottom:10px;
}

.post img{
    width:100%;
    border-radius:10px;
    margin-top:10px;
}

.actions{
    display:flex;
    justify-content:space-around;
    margin-top:15px;
    padding-top:10px;
    border-top:1px solid #ddd;
}

.actions button{
    background:none;
    border:none;
    padding:10px;
    cursor:pointer;
    border-radius:5px;
}

.actions button:hover{
    background:#f0f2f5;
}
</style>

</head>
<body>

<header>
    <div class="logo">SocialBook</div>
    <input type="text" class="search" placeholder="Rechercher...">
</header>

<div class="container">

    <aside class="sidebar">
        <ul>
            <li>🏠 Accueil</li>
            <li>👥 Amis</li>
            <li>💬 Messages</li>
            <li>🔔 Notifications</li>
            <li>⚙️ Paramètres</li>
        </ul>
    </aside>

    <main class="feed">

        <div class="post">
            <h3>Alice Martin</h3>
            <p>Bonjour tout le monde ! ☀️</p>

            <div class="actions">
                <button>👍 J'aime</button>
                <button>💬 Commenter</button>
                <button>↗ Partager</button>
            </div>
        </div>

        <div class="post">
            <h3>Jean Dupont</h3>
            <p>Super journée à la plage !</p>

            <img src="https://picsum.photos/700/400" alt="Image">

            <div class="actions">
                <button>👍 J'aime</button>
                <button>💬 Commenter</button>
                <button>↗ Partager</button>
            </div>
        </div>

        <div class="post">
            <h3>Marie Bernard</h3>
            <p>Je découvre le développement web aujourd'hui ! 🚀</p>

            <div class="actions">
                <button>👍 J'aime</button>
                <button>💬 Commenter</button>
                <button>↗ Partager</button>
            </div>
        </div>

    </main>

</div>

</body>
</html>
