<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SocialBook</title>

<style>
:root{
    --blue:#1877f2;
    --bg:#f0f2f5;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    background:var(--bg);
}

header{
    background:white;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    box-shadow:0 1px 4px rgba(0,0,0,.1);
}

.logo{
    color:var(--blue);
    font-size:32px;
    font-weight:bold;
}

.search{
    width:250px;
    padding:10px;
    border:none;
    border-radius:25px;
    background:#f0f2f5;
}

.container{
    max-width:1200px;
    margin:20px auto;
    display:grid;
    grid-template-columns:250px 1fr 250px;
    gap:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:15px;
    box-shadow:0 1px 3px rgba(0,0,0,.1);
}

.menu-item{
    padding:12px;
    border-radius:8px;
    cursor:pointer;
}

.menu-item:hover{
    background:#f0f2f5;
}

.post{
    background:white;
    border-radius:12px;
    overflow:hidden;
    margin-bottom:20px;
    box-shadow:0 1px 3px rgba(0,0,0,.1);
}

.post-header{
    display:flex;
    align-items:center;
    gap:10px;
    padding:15px;
}

.avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#ccc;
}

.post-content{
    padding:0 15px 15px;
}

.post img{
    width:100%;
    display:block;
}

.actions{
    display:flex;
    border-top:1px solid #ddd;
}

.actions button{
    flex:1;
    border:none;
    background:white;
    padding:12px;
    cursor:pointer;
    font-size:15px;
}

.actions button:hover{
    background:#f0f2f5;
}

.contact{
    padding:10px;
    border-radius:8px;
}

.contact:hover{
    background:#f0f2f5;
}

@media(max-width:900px){
    .container{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<header>
    <div class="logo">SocialBook</div>
    <input type="text" class="search" placeholder="Rechercher...">
</header>

<div class="container">

    <aside>
        <div class="card">
            <div class="menu-item">🏠 Accueil</div>
            <div class="menu-item">👥 Amis</div>
            <div class="menu-item">💬 Messages</div>
            <div class="menu-item">🎮 Jeux</div>
            <div class="menu-item">⚙️ Paramètres</div>
        </div>
    </aside>

    <main>

        <div class="post">
            <div class="post-header">
                <div class="avatar"></div>
                <strong>Alice Martin</strong>
            </div>

            <div class="post-content">
                Bonjour tout le monde ! ☀️
            </div>

            <img src="https://picsum.photos/900/450" alt="Image">

            <div class="actions">
                <button>👍 J'aime</button>
                <button>💬 Commenter</button>
                <button onclick="partager()">↗ Partager</button>
            </div>
        </div>

        <div class="post">
            <div class="post-header">
                <div class="avatar"></div>
                <strong>Jean Dupont</strong>
            </div>

            <div class="post-content">
                Je découvre le développement web aujourd'hui !
            </div>

            <div class="actions">
                <button>👍 J'aime</button>
                <button>💬 Commenter</button>
                <button onclick="partager()">↗ Partager</button>
            </div>
        </div>

    </main>

    <aside>
        <div class="card">
            <h3>Contacts</h3>
            <br>
            <div class="contact">🟢 Alice</div>
            <div class="contact">🟢 Thomas</div>
            <div class="contact">🟢 Julie</div>
            <div class="contact">🟢 Lucas</div>
        </div>
    </aside>

</div>

<script>
function partager() {

    const lien = window.location.href;

    if (navigator.share) {

        navigator.share({
            title: document.title,
            text: "Découvre cette publication !",
            url: lien
        });

    } else {

        navigator.clipboard.writeText(lien)
        .then(() => {
            alert("Lien copié dans le presse-papiers !");
        })
        .catch(() => {
            prompt("Copiez ce lien :", lien);
        });

    }
}
</script>

</body>
</html>
